<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ottawa Hydrant Tracker 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* LOGIN */
#login-screen { position: fixed; inset: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 2rem; }
.login-logo { width: 64px; height: 64px; background: #e63946; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
.login-logo svg { width: 32px; height: 32px; fill: white; }
.login-title { color: white; font-size: 22px; font-weight: 600; margin-bottom: 0.5rem; }
.login-sub { color: #aaa; font-size: 14px; margin-bottom: 2rem; }
.login-label { color: #ccc; font-size: 13px; margin-bottom: 0.5rem; align-self: flex-start; width: 100%; max-width: 320px; }
.painter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 320px; margin-bottom: 1.5rem; }
.painter-btn { background: #252540; border: 1.5px solid #333; color: #ccc; padding: 12px 8px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; }
.painter-btn.selected { background: #e63946; border-color: #e63946; color: white; }
.add-painter-row { display: flex; gap: 8px; width: 100%; max-width: 320px; margin-bottom: 1.5rem; }
.add-painter-input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #333; background: #252540; color: white; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.add-painter-input:focus { outline: none; border-color: #e63946; }
.add-painter-btn { background: #333; border: none; color: #ccc; padding: 10px 14px; border-radius: 10px; font-size: 13px; cursor: pointer; }
.login-btn { width: 100%; max-width: 320px; padding: 14px; background: #e63946; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
.login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.reset-link { margin-top: 14px; background: transparent; border: none; color: #666; font-size: 12px; cursor: pointer; text-decoration: underline; }

/* TOPBAR */
#topbar { background: #1a1a2e; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; display: none; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.hydrant-icon { width: 28px; height: 28px; background: #e63946; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.hydrant-icon svg { width: 16px; height: 16px; fill: white; }
.topbar-title { font-size: 15px; font-weight: 600; }
.topbar-painter { font-size: 12px; color: #aaa; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.stat-pill { border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 500; }
.stat-pill.done { background: rgba(39,174,96,0.3); color: #6ee09a; }
.stat-pill.total { background: rgba(255,255,255,0.1); color: #ccc; }
.topbar-btn { background: rgba(255,255,255,0.1); border: none; color: #ccc; font-size: 12px; font-weight: 600; cursor: pointer; padding: 6px 10px; border-radius: 8px; }

/* PROGRESS */
#progress-wrap { height: 3px; background: #333; display: none; }
.progress-bar-fill { height: 100%; background: #27ae60; transition: width 0.5s ease; }

/* FILTERBAR */
#filterbar { background: #252540; padding: 8px 12px; display: none; gap: 8px; overflow-x: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; }
#filterbar::-webkit-scrollbar { display: none; }
.filter-btn { background: transparent; border: 1.5px solid #444; color: #ccc; padding: 5px 12px; border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
.filter-btn.active { background: #e63946; border-color: #e63946; color: white; }

/* MAP */
#map { flex: 1; z-index: 1; display: none; }

/* IMPORT */
#import-row { display: none; background: #252540; color: #ccc; border: none; border-top: 1px solid #333; padding: 10px 16px; font-size: 13px; cursor: pointer; text-align: left; }

/* BOTTOM PANEL */
#bottom-panel { background: white; border-top: 1px solid #eee; flex-shrink: 0; overflow: hidden; display: none; }
#bottom-panel.collapsed { height: 56px; }
#bottom-panel.expanded { height: 260px; }
.panel-handle { height: 56px; display: flex; align-items: center; padding: 0 16px; cursor: pointer; justify-content: space-between; }
.panel-handle-title { font-size: 14px; font-weight: 600; color: #1a1a2e; }
.panel-handle-arrow { font-size: 18px; color: #999; transition: transform 0.2s; }
#bottom-panel.expanded .panel-handle-arrow { transform: rotate(180deg); }
.panel-content { padding: 0 16px 16px; overflow-y: auto; height: 204px; }

/* DETAIL CARD */
.detail-card { background: #f9f9f9; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.detail-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.detail-struct-id { font-size: 15px; font-weight: 700; color: #1a1a2e; font-family: monospace; }
.detail-struct-sub { font-size: 11px; color: #888; margin-top: 2px; }
.detail-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.detail-badge.unpainted { background: #ffeaea; color: #c0392b; }
.detail-badge.painted { background: #eafaf1; color: #1e8449; }
.detail-address { font-size: 14px; color: #333; margin-bottom: 6px; }
.detail-meta { display: flex; gap: 12px; font-size: 12px; color: #888; margin-bottom: 12px; }
.detail-painted-info { background: #eafaf1; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #1e8449; margin-bottom: 10px; display: flex; gap: 16px; }
.mark-btn { width: 100%; padding: 12px; background: #e63946; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
.mark-btn:disabled { background: #27ae60; cursor: default; }
.undo-btn { width: 100%; padding: 10px; background: transparent; color: #e63946; border: 1.5px solid #e63946; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; }

/* SYNC BAR */
#sync-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #27ae60; color: white; text-align: center; font-size: 13px; padding: 8px; z-index: 9998; transform: translateY(100%); transition: transform 0.3s; }
#sync-bar.visible { transform: translateY(0); }
#sync-bar.error { background: #e63946; }

/* SETUP PANEL */
#setup-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9990; align-items: center; justify-content: center; padding: 1rem; }
#setup-panel.open { display: flex; }
.setup-card { background: white; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
.setup-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 1rem; }
.setup-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; display: block; }
.setup-input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; word-break: break-all; }
.setup-save-btn { width: 100%; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
.setup-close-btn { width: 100%; padding: 10px; background: transparent; color: #888; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; cursor: pointer; }

/* ROUTES PANEL */
#routes-panel { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:5000; align-items:flex-end; justify-content:center; }
#routes-panel.open { display:flex; }
.routes-sheet { background:white; border-radius:20px 20px 0 0; width:100%; max-width:600px; max-height:85vh; display:flex; flex-direction:column; }
.routes-sheet-header { padding:16px 16px 8px; border-bottom:1px solid #eee; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.routes-sheet-title { font-size:16px; font-weight:700; color:#1a1a2e; }
.routes-close-btn { background:transparent; border:none; font-size:22px; cursor:pointer; color:#999; }
.routes-zone-tabs { display:flex; gap:0; border-bottom:1px solid #eee; flex-shrink:0; }
.routes-zone-tab { flex:1; padding:10px; text-align:center; font-size:14px; font-weight:600; cursor:pointer; color:#888; border:none; background:transparent; border-bottom:3px solid transparent; }
.routes-zone-tab.active { color:#e63946; border-bottom-color:#e63946; }
.routes-list { flex:1; overflow-y:auto; padding:12px; }
.route-card { border:2px solid #eee; border-radius:12px; padding:12px; margin-bottom:10px; cursor:pointer; transition:all 0.15s; }
.route-card:hover { border-color:#ccc; }
.route-card.status-red { border-color:#e63946; background:#fff8f8; }
.route-card.status-yellow { border-color:#f39c12; background:#fffbf0; }
.route-card.status-green { border-color:#27ae60; background:#f0fff4; }
.route-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.route-card-label { font-size:15px; font-weight:700; color:#1a1a2e; }
.route-card-count { font-size:12px; color:#888; }
.route-status-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.route-status-dot.red { background:#e63946; }
.route-status-dot.yellow { background:#f39c12; }
.route-status-dot.green { background:#27ae60; }
.route-card-streets { font-size:12px; color:#666; line-height:1.5; margin-bottom:6px; }
.route-card-progress { height:4px; background:#eee; border-radius:2px; overflow:hidden; }
.route-card-progress-fill { height:100%; border-radius:2px; transition:width 0.3s; }
.route-card-progress-fill.red { background:#e63946; }
.route-card-progress-fill.yellow { background:#f39c12; }
.route-card-progress-fill.green { background:#27ae60; }
.route-card-meta { display:flex; justify-content:space-between; margin-top:6px; font-size:11px; color:#aaa; }

/* ACTIVE ROUTE BAR */
#active-route-bar { display:none; background:#1a1a2e; color:white; padding:8px 16px; flex-shrink:0; align-items:center; justify-content:space-between; }
#active-route-bar.visible { display:flex; }
.active-route-label { font-size:13px; font-weight:600; }
.active-route-progress { font-size:12px; color:#aaa; }
.exit-route-btn { background:#e63946; border:none; color:white; padding:5px 10px; border-radius:6px; font-size:12px; cursor:pointer; font-weight:600; }

</style>
</head>

</div>

const APP_KEY   = 'ottawa_hydrant_v1';
const PAINTERS  = ['DJ','TW','LP','DB','JAD','YPV'];
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzcyD2UgPNWz5sCVukfG0Xl508TjjmG7tkCqJxdz-SDXXhDuKqp8NzABjMTNpZ2eCb/exec';
const SHEET_ID   = '1dFgVYgTgcTJZK8Q9KCeYisISAuMqm0FfXDGqQlKp0z0';

// ── STATE ──
var state = {
  painter: '',
  filter: 'all',
  pendingSync: [],
  paintedMap: {}   // hydrantId -> {date, time, painter}
};

// ── LOAD / SAVE STATE ──
function loadState() {
  try {
    var s = localStorage.getItem(APP_KEY);
    if (s) {
      var saved = JSON.parse(s);
      if (saved.painter)     state.painter     = saved.painter;
      if (saved.pendingSync) state.pendingSync  = saved.pendingSync;
      if (saved.paintedMap)  state.paintedMap   = saved.paintedMap;
    }
  } catch(e) {
    localStorage.removeItem(APP_KEY);
  }
}
function saveState() {
  try { localStorage.setItem(APP_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── MAP & MARKERS ──
var map, markerLayer, selectedId;

// ── INIT APP (called after login) ──
function initApp() {
  document.getElementById('topbar').style.display        = 'flex';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('filterbar').style.display     = 'flex';
  document.getElementById('map').style.display           = 'block';
  document.getElementById('import-row').style.display    = 'block';
  document.getElementById('bottom-panel').style.display  = 'block';
  document.getElementById('topbar-painter').textContent  = 'Painter: ' + state.painter;

  if (!map) {
    map = L.map('map', { zoomControl: true }).setView([45.4192, -75.6914], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO', maxZoom: 19, subdomains: 'abcd'
    }).addTo(map);
    markerLayer = L.layerGroup().addTo(map);
  }

  setTimeout(function() {
    map.invalidateSize();
    updateStats();
    renderMarkers();
    var pts = CITY_HYDRANTS.filter(function(h){ return h.lat && h.lng; }).map(function(h){ return [h.lat, h.lng]; });
    if (pts.length) map.fitBounds(pts, { padding: [30,30] });
  }, 200);

  if (state.pendingSync && state.pendingSync.length) syncPending();

  // Fetch live painted state from Google Sheet so all painters see same data
  fetchLiveState();
}

// ── MARKERS ──
function getFiltered() {
  return CITY_HYDRANTS.filter(function(h) {
    if (state.filter === 'unpainted') return !state.paintedMap[h.id];
    if (state.filter === 'painted')   return  state.paintedMap[h.id];
    if (state.filter === 'mine')      return state.paintedMap[h.id] && state.paintedMap[h.id].painter === state.painter;
    if (state.filter === 'z18')       return h.zone === 'Z18';
    if (state.filter === 'z19')       return h.zone === 'Z19';
    if (state.filter === 'z15')       return h.zone === 'Z15';
    return true;
  });
}

function renderMarkers() {
  if (!markerLayer) return;
  markerLayer.clearLayers();
  getFiltered().forEach(function(h) {
    var painted    = !!state.paintedMap[h.id];
    var isSelected = selectedId === h.id;
    L.circleMarker([h.lat, h.lng], {
      radius:      isSelected ? 10 : 7,
      fillColor:   painted ? '#27ae60' : '#e63946',
      color:       isSelected ? '#ffff00' : '#ffffff',
      weight:      isSelected ? 3 : 2,
      opacity:     1,
      fillOpacity: 1
    }).addTo(markerLayer).on('click', function() { selectHydrant(h.id); });
  });
}

function selectHydrant(id) {
  selectedId = id;
  var h = CITY_HYDRANTS.find(function(x){ return x.id === id; });
  if (!h) return;
  map.panTo([h.lat, h.lng]);
  renderMarkers();
  showDetail(h);
  document.getElementById('bottom-panel').className = 'expanded';
}

function showDetail(h) {
  var pInfo   = state.paintedMap[h.id];
  var painted = !!pInfo;
  var addr    = [h.houseNum, h.street].filter(Boolean).join(' ');
  document.getElementById('panel-title').textContent = h.id + (addr ? ' — ' + addr : '');
  document.getElementById('panel-content').innerHTML =
    '<div class="detail-card">' +
      '<div class="detail-card-header">' +
        '<div><div class="detail-struct-id">' + h.id + '</div>' +
        '<div class="detail-struct-sub">' + (h.structId||'') + '</div></div>' +
        '<div class="detail-badge ' + (painted?'painted':'unpainted') + '">' + (painted?'Painted':'Unpainted') + '</div>' +
      '</div>' +
      '<div class="detail-address">' + (addr||'No address on file') + '</div>' +
      '<div class="detail-meta"><span>📍 ' + (h.zone||'') + '</span><span>🎨 ' + (h.colourRating||'') + '</span></div>' +
      (painted ? '<div class="detail-painted-info"><span>✓ ' + pInfo.date + '</span><span>' + (pInfo.time||'') + '</span><span>' + (pInfo.painter||'') + '</span></div>' : '') +
      '<button class="mark-btn" id="mark-btn-' + h.id + '" ' + (painted?'disabled':'') + ' onclick="markPainted(\'' + h.id + '\')">' +
        (painted ? '✓ Painted' : '✔ Mark as Painted') +
      '</button>' +
      (painted ? '<button class="undo-btn" onclick="undoPainted(\'' + h.id + '\')">Undo</button>' : '') +
    '</div>';
}

// ── MARK / UNDO ──
function markPainted(id) {
  var h   = CITY_HYDRANTS.find(function(x){ return x.id === id; });
  if (!h || state.paintedMap[id]) return;
  var now = new Date();
  state.paintedMap[id] = {
    date:    now.toLocaleDateString('en-CA'),
    time:    now.toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit'}),
    painter: state.painter
  };
  state.pendingSync.push({ id: id, structId: h.structId });
  saveState();
  updateStats();
  renderMarkers();
  showDetail(h);
  syncHydrant(id);
  showSync('✓ Marked — syncing to Google Sheet...', false);
}

function undoPainted(id) {
  delete state.paintedMap[id];
  state.pendingSync = state.pendingSync.filter(function(p){ return p.id !== id; });
  saveState();
  updateStats();
  renderMarkers();
  var h = CITY_HYDRANTS.find(function(x){ return x.id === id; });
  if (h) showDetail(h);
  // Clear the entry from Google Sheet
  undoSyncToSheet(id);
}

function undoSyncToSheet(id) {
  if (!SCRIPT_URL) return;
  var url = SCRIPT_URL +
    '?action=undo' +
    '&hydrantId=' + encodeURIComponent(id) +
    '&sheetId='   + encodeURIComponent(SHEET_ID);
  fetch(url, { mode: 'no-cors' })
    .then(function() { showSync('\u2713 Undo synced \u2014 entry cleared from Google Sheet', false); })
    .catch(function() { showSync('\u26a0 Undo saved locally \u2014 will sync when connected', true); });
}

// ── LIVE STATE FETCH ──
function fetchLiveState() {
  if (!SCRIPT_URL) return;
  var url = SCRIPT_URL + '?action=status&sheetId=' + encodeURIComponent(SHEET_ID);
  fetch(url)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.status === 'success' && data.painted && data.painted.length > 0) {
        var updated = false;
        data.painted.forEach(function(entry) {
          if (!state.paintedMap[entry.hydrantId]) {
            // New painted entry from sheet — add to local state
            state.paintedMap[entry.hydrantId] = {
              date:    entry.datePainted,
              time:    '',
              painter: entry.painter
            };
            updated = true;
          }
        });
        if (updated) {
          saveState();
          updateStats();
          renderMarkers();
          if (activeRouteNum !== null) {
            var route = ROUTES.find(function(r){ return r.routeNum === activeRouteNum; });
            if (route) { renderMarkersWithRoute(route); updateActiveRouteBar(route); }
          }
        }
      }
    })
    .catch(function() {
      // Offline or error — continue with local state
    });
}

// ── SYNC ──
function syncHydrant(id) {
  var pInfo = state.paintedMap[id];
  var h     = CITY_HYDRANTS.find(function(x){ return x.id === id; });
  if (!pInfo || !h || !SCRIPT_URL) return;
  var url = SCRIPT_URL +
    '?action=mark' +
    '&hydrantId='  + encodeURIComponent(id) +
    '&structId='   + encodeURIComponent(h.structId||'') +
    '&painter='    + encodeURIComponent(pInfo.painter) +
    '&date='       + encodeURIComponent(pInfo.date) +
    '&time='       + encodeURIComponent(pInfo.time) +
    '&sheetId='    + encodeURIComponent(SHEET_ID);
  fetch(url, { mode: 'no-cors' })
    .then(function() {
      state.pendingSync = state.pendingSync.filter(function(p){ return p.id !== id; });
      saveState();
      showSync('✓ Synced to Google Sheet', false);
    })
    .catch(function() { showSync('⚠ Offline — will sync when connected', true); });
}

function syncPending() {
  if (!state.pendingSync || !state.pendingSync.length) return;
  state.pendingSync.slice().forEach(function(p) { syncHydrant(p.id); });
}

function showSync(msg, isError) {
  var bar = document.getElementById('sync-bar');
  bar.textContent = msg;
  bar.className = 'visible' + (isError ? ' error' : '');
  setTimeout(function() { bar.className = ''; }, 3000);
}

// ── STATS ──
function updateStats() {
  var total = CITY_HYDRANTS.length;
  var done  = Object.keys(state.paintedMap).length;
  document.getElementById('stat-done').textContent  = done + ' done';
  document.getElementById('stat-total').textContent = total + ' total';
  document.getElementById('progress-fill').style.width = (done/total*100).toFixed(1) + '%';
}

// ── LOGOUT ──
function doLogout() {
  state.painter = '';
  state.filter  = 'all';
  saveState();
  document.getElementById('topbar').style.display        = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('filterbar').style.display     = 'none';
  document.getElementById('map').style.display           = 'none';
  document.getElementById('import-row').style.display    = 'none';
  document.getElementById('bottom-panel').style.display  = 'none';
  document.getElementById('login-screen').style.display  = 'flex';

// ── PAINTERS ──
function renderPainters() {
  var grid = document.getElementById('painter-grid');
  grid.innerHTML = PAINTERS.map(function(p) {
    return '<button class="painter-btn' + (state.painter===p?' selected':'') + '" data-painter="' + p + '">' + p + '</button>';
  }).join('');
  grid.querySelectorAll('.painter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { selectPainter(this.dataset.painter); });
  });

function selectPainter(p) {
  state.painter = p;
  document.querySelectorAll('.painter-btn').forEach(function(b) {
    b.classList.toggle('selected', b.dataset.painter === p);
  });
  document.getElementById('login-btn').disabled = false;
}

// ── BOOT ──
loadState();
renderPainters();

// Wire up all buttons via addEventListener (no inline onclick issues)
document.getElementById('login-btn').addEventListener('click', function() {
  if (!state.painter) return;
  saveState();
  document.getElementById('login-screen').style.display = 'none';

document.getElementById('add-btn').addEventListener('click', function() {

document.getElementById('f-all').addEventListener('click', function() { setFilter('all', this); });

function setFilter(f, btn) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

// ── ROUTES ──
var activeRouteNum = null;
var routesZoneTab = 'Z18';

function openRoutesPanel() {
  renderRoutesList();
  document.getElementById('routes-panel').classList.add('open');
}

function closeRoutesPanel() {
  document.getElementById('routes-panel').classList.remove('open');
  // Reset filter back to all
  if (activeRouteNum === null) {
    setFilterSilent('all');
    document.getElementById('f-all').classList.add('active');
    document.querySelectorAll('.filter-btn').forEach(function(b){ if(b.id !== 'f-all') b.classList.remove('active'); });
    renderMarkers();
  }
}

function getRouteStatus(route) {
  var painted = 0;
  route.hydrantIds.forEach(function(hid){ if(state.paintedMap[hid]) painted++; });
  if(painted === 0) return { status:'red', painted:painted, total:route.count };
  if(painted === route.count) return { status:'green', painted:painted, total:route.count };
  return { status:'yellow', painted:painted, total:route.count };
}

function renderRoutesList() {
  var list = document.getElementById('routes-list');
  var zoneRoutes = ROUTES.filter(function(r){ return r.zone === routesZoneTab; });
  list.innerHTML = zoneRoutes.map(function(route) {
    var s = getRouteStatus(route);
    var pct = Math.round(s.painted/s.total*100);
    var isActive = activeRouteNum === route.routeNum;
    return '<div class="route-card status-' + s.status + (isActive?' selected':'') + '" onclick="selectRoute(' + route.routeNum + ')">' +
      '<div class="route-card-header">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<div class="route-status-dot ' + s.status + '"></div>' +
          '<div class="route-card-label">' + route.label + '</div>' +
        '</div>' +
        '<div class="route-card-count">' + s.painted + ' / ' + s.total + ' painted</div>' +
      '</div>' +
      '<div class="route-card-streets">📍 ' + route.streets.join(' → ') + '</div>' +
      '<div class="route-card-progress">' +
        '<div class="route-card-progress-fill ' + s.status + '" style="width:' + pct + '%"></div>' +
      '</div>' +
      '<div class="route-card-meta"><span>' + route.distKm + 'km route</span><span>' + route.count + ' hydrants</span></div>' +
    '</div>';
  }).join('');
}

function selectRoute(routeNum) {
  activeRouteNum = routeNum;
  var route = ROUTES.find(function(r){ return r.routeNum === routeNum; });
  if(!route) return;
  
  // Close panel
  document.getElementById('routes-panel').classList.remove('open');
  
  // Show active route bar
  document.getElementById('active-route-bar').classList.add('visible');
  updateActiveRouteBar(route);
  
  // Filter map to show only this route's hydrants, numbered
  state.filter = 'route:' + routeNum;
  renderMarkersWithRoute(route);
  
  // Zoom to route
  var pts = route.hydrantIds.map(function(hid){ var h = CITY_HYDRANTS.find(function(x){return x.id===hid;}); return h ? [h.lat,h.lng] : null; }).filter(Boolean);
  if(pts.length) map.fitBounds(pts, {padding:[40,40]});
}

function updateActiveRouteBar(route) {
  var s = getRouteStatus(route);
  document.getElementById('active-route-label').textContent = route.label + ' — ' + route.streets.slice(0,2).join(', ');
  document.getElementById('active-route-progress').textContent = s.painted + ' / ' + s.total + ' painted (' + Math.round(s.painted/s.total*100) + '%)';
}

function exitRoute() {
  activeRouteNum = null;
  document.getElementById('active-route-bar').classList.remove('visible');
  state.filter = 'all';
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('f-all').classList.add('active');
  renderMarkers();
}

function renderMarkersWithRoute(route) {
  if(!markerLayer) return;
  markerLayer.clearLayers();
  
  route.hydrantIds.forEach(function(hid, idx) {
    var h = CITY_HYDRANTS.find(function(x){return x.id===hid;});
    if(!h || !h.lat || !h.lng) return;
    var painted = !!state.paintedMap[h.id];
    var isSelected = selectedId === h.id;
    var seqNum = idx + 1;
    
    // Number labels for route view
    var color = painted ? '#27ae60' : '#e63946';
    var size = isSelected ? 22 : 18;
    var icon = L.divIcon({
      className: '',
      html: '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color + ';border:' + (isSelected?'3px solid #ffff00':'2px solid white') + ';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;box-shadow:0 1px 4px rgba(0,0,0,0.4)">' + seqNum + '</div>',
      iconSize: [size,size], iconAnchor: [size/2,size/2]
    });
    L.marker([h.lat, h.lng], {icon:icon}).addTo(markerLayer).on('click', function(){ selectHydrant(h.id); });
  });
}

// Override renderMarkers to handle route mode
var _origRenderMarkers = renderMarkers;
renderMarkers = function() {
  if(activeRouteNum !== null) {
    var route = ROUTES.find(function(r){ return r.routeNum === activeRouteNum; });
    if(route) { renderMarkersWithRoute(route); return; }
  }
  _origRenderMarkers();
};

// Override markPainted to update route bar
var _origMarkPainted = markPainted;
markPainted = function(id) {
  _origMarkPainted(id);
  if(activeRouteNum !== null) {
    var route = ROUTES.find(function(r){ return r.routeNum === activeRouteNum; });
    if(route) updateActiveRouteBar(route);
  }
};

function setFilterSilent(f) { state.filter = f; }


// Routes panel events
document.getElementById('f-routes').addEventListener('click', function() {
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  this.classList.add('active');
  openRoutesPanel();
});
document.getElementById('routes-close-btn').addEventListener('click', closeRoutesPanel);
document.getElementById('exit-route-btn').addEventListener('click', exitRoute);
document.getElementById('rtab-z18').addEventListener('click', function() {
  routesZoneTab = 'Z18';
  document.getElementById('rtab-z18').classList.add('active');
  document.getElementById('rtab-z19').classList.remove('active');
  renderRoutesList();
});
document.getElementById('rtab-z19').addEventListener('click', function() {
  routesZoneTab = 'Z19';
  document.getElementById('rtab-z19').classList.add('active');
  document.getElementById('rtab-z18').classList.remove('active');
  document.getElementById('rtab-z15').classList.remove('active');
  renderRoutesList();
});
document.getElementById('rtab-z15').addEventListener('click', function() {
  routesZoneTab = 'Z15';
  document.getElementById('rtab-z15').classList.add('active');
  document.getElementById('rtab-z18').classList.remove('active');
  document.getElementById('rtab-z19').classList.remove('active');
  renderRoutesList();
});

// Auto-login if painter already set
if (state.painter) {
  document.getElementById('login-screen').style.display = 'none';
  initApp();
}
</script>
